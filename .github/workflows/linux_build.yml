name: 🐧 Linux Builds

description: Build Draconic Engine on Linux using Clang 20 and CMake with Ninja

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  build-linux:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Clang Compiler
        uses: egor-tensin/setup-clang@v1
        with:
          version: 20

      - name: Install System Dependencies
        run: |
          wget https://github.com/Kitware/CMake/releases/download/v4.3.0/cmake-4.3.0-linux-x86_64.tar.gz
          tar -xzf cmake-4.3.0-linux-x86_64.tar.gz
          echo "$(pwd)/cmake-4.3.0-linux-x86_64/bin" >> $GITHUB_PATH

          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            llvm-20 \
            llvm-20-tools \
            clang-tools-20 \
            libc++-20-dev \
            libc++abi-20-dev \
            libgl1-mesa-dev \
            libegl1-mesa-dev \
            libwayland-egl1-mesa \
            libasound2-dev \
            libpulse-dev \
            libwayland-dev \
            libx11-dev \
            libxext-dev \
            libxrender-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libxtst-dev
          echo "/usr/lib/llvm-20/bin" >> $GITHUB_PATH

      - name: Verify LLVM Toolchain
        run: |
          which clang
          which clang++
          which clang-scan-deps
          clang --version
          clang++ --version
          clang-scan-deps --version

      - name: Cache Build Artifacts
        uses: actions/cache@v4
        with:
          path: |
            build/debug/.ninja_deps
            build/debug/.ninja_log
            build/debug/CMakeFiles
          key: ${{ runner.os }}-draconic-build-${{ hashFiles('**/CMakeLists.txt', '**/*.cmake', '**/CMakePresets.json') }}
          restore-keys: |
            ${{ runner.os }}-draconic-build-

      - name: Configure Build System
        run: |
          cmake --preset debug \
            -B build/debug \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_CXX_FLAGS="-stdlib=libc++" \
            -DCMAKE_EXE_LINKER_FLAGS="-stdlib=libc++" \
            -DCMAKE_BUILD_WITH_INSTALL_RPATH=TRUE \
            -DCMAKE_INSTALL_RPATH="\$ORIGIN:\$ORIGIN/engine/native"

      - name: Compile Target Binary
        run: |
          cmake --build build/debug -j$(nproc)

      - name: Run Unit Tests
        run: |
          ctest --test-dir build/debug --output-on-failure -j$(nproc)

      - name: Upload Engine Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux_debug
          path: build/debug/
          if-no-files-found: error
          retention-days: 7